services:
  postgres:
    image: postgres:17
    container_name: api_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: unnamed_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d unnamed_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    image: airlance/go:1.26.compile
    container_name: api_server
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  postgres_data:
